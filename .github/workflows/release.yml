name: Build Zed Extension
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Rust WASM
        run: rustup target add wasm32-wasip1

      - name: Build Extension (Release)
        run: cargo build --release --target wasm32-wasip1

      - name: Package Extension
        run: |
          mkdir -p dist
          # Ensure the filename matches your Cargo.toml package name
          cp target/wasm32-wasip1/release/novacibes_rust_pro.wasm dist/extension.wasm
          cp extension.toml dist/
          zip -j novacibes-pro-latest.zip dist/*

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: novacibes-extension
          path: novacibes-pro-latest.zip
