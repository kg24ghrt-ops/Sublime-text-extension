id = "novacibes-python-runner"
name = "NovaCibes Python Runner"
version = "0.1.0"
schema_version = 1
description = "Execute Python code on your private Hugging Face runner"
authors = ["You <you@example.com>"]
repository = "https://github.com/your-username/novacibes-python-runner"

[context_servers.novacibes-python-runner]
description = "NovaCibes Python Runner"
settings = [
    { name = "huggingface_token", type = "string", description = "Your Hugging Face personal access token" },
    { name = "runner_url", type = "string", description = "Base URL of the runner", default = "https://novacibes-python-running-api.hf.space" }
]

[slash_commands.python-run]
description = "Run Python code on the NovaCibes runner"
requires_argument = true
tooltip_text = "Run Python Code"

[slash_commands.python-stop]
description = "Stop a running Python process"
requires_argument = false
tooltip_text = "Stop Runner"